<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My AWS CodePipeline Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f7fb;
      color: #1f2937;
      text-align: center;
    }
    header {
      background: #111827;
      color: white;
      padding: 40px 20px;
    }
    main {
      padding: 50px 20px;
    }
    .card {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <header>
    <h1>Website deployed with AWS CodePipeline</h1>
  </header>
  <main>
    <div class="card">
      <h2>Hello from AWS</h2>
      <p>This is a sample static website built and deployed using GitHub, CodePipeline, CodeBuild, and Amazon S3.</p>
      <p>This is a new line added for checking ci/cd</p>
    </div>
  </main>
</body>
</html>
